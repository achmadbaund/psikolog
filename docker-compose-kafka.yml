version: '3.8'

services:
  # ============================================
  # KAFKA INFRASTRUCTURE
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: psikolog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - psikolog-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: psikolog-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - psikolog-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka UI (kafbat)
  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: psikolog-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: psikolog
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - psikolog-network

  # ============================================
  # KONG API GATEWAY
  # ============================================
  # Database untuk Kong
  kong-database:
    image: postgres:13-alpine
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kong-data:/var/lib/postgresql/data
    networks:
      - psikolog-network

  # Bootstrap Kong (migrasi database)
  kong-migration:
    image: kong:3.8
    container_name: kong-migration
    command: "kong migrations bootstrap"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    depends_on:
      kong-database:
        condition: service_healthy
    restart: on-failure
    networks:
      - psikolog-network

  # Kong Gateway
  kong:
    image: kong:3.8
    container_name: kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    ports:
      - "8000:8000"   # Proxy port (HTTP)
      - "8443:8443"   # Proxy port (HTTPS)
      - "8001:8001"   # Admin API port
      - "8444:8444"   # Admin API port (HTTPS)
      - "8002:8002"   # Kong Manager GUI
      - "8445:8445"   # Kong Manager GUI (HTTPS)
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: on-failure
    networks:
      - psikolog-network

  # ============================================
  # CQRS MYSQL DATABASES
  # ============================================
  mysql-write:
    image: mysql:8.0
    container_name: booking-mysql-write
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: booking_write
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-write-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - psikolog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-read:
    image: mysql:8.0
    container_name: booking-mysql-read
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: booking_read
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql-read-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - psikolog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: booking-phpmyadmin
    links:
      - mysql-write
      - mysql-read
    environment:
      PMA_HOSTS: mysql-write,mysql-read
      PMA_ARBITRARY: 1
    ports:
      - "80:80"
    networks:
      - psikolog-network
    depends_on:
      - mysql-write
      - mysql-read

  # ============================================
  # FASKES SERVICE (Producer)
  # ============================================
  faskes-service:
    build:
      context: ./faskes-service
      dockerfile: Dockerfile
    image: psikolog-faskes-service:latest
    container_name: faskes-service
    ports:
      - "8009:8009"
    volumes:
      - ./faskes-service/data:/app/data
    environment:
      PORT: 8009
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: booking-events
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - psikolog-network
    depends_on:
      kafka:
        condition: service_healthy

  # ============================================
  # BOOKING SERVICE (Consumer)
  # ============================================
  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    image: psikolog-booking-service:latest
    container_name: booking-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      # CQRS MySQL Configuration
      CQRS_ENABLED: "true"
      WRITE_DB_HOST: mysql-write
      WRITE_DB_PORT: 3306
      WRITE_DB_USERNAME: user
      WRITE_DB_PASSWORD: userpassword
      WRITE_DB_DATABASE: booking_write
      READ_DB_HOST: mysql-read
      READ_DB_PORT: 3306
      READ_DB_USERNAME: user
      READ_DB_PASSWORD: userpassword
      READ_DB_DATABASE: booking_read
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: booking-processor
      KAFKA_TOPIC: booking-events
      KAFKA_CONSUMER_ENABLED: "true"
      NODE_ENV: development
    depends_on:
      mysql-write:
        condition: service_healthy
      mysql-read:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - psikolog-network

volumes:
  mysql-write-data:
  mysql-read-data:
  kong-data:

networks:
  psikolog-network:
    driver: bridge
